apiVersion: apps/v1
kind: Deployment
metadata:
  name: qos-guaranteed
  labels:
    app: gromit-guaranteed
spec:
  replicas: 3
  selector:
    matchLabels:
      app: gromit-guaranteed
  template:
    metadata:
      labels:
        app: gromit-guaranteed
    spec:
      containers:
      - name: gromit-is-best
        image: blux2/hello-server:1.6
        ports:
        - containerPort: 8080
        resources:
          requests:
            memory: "7Gi"
            cpu: "10m"
          limits:
            memory: "7Gi"
            cpu: "10m"
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 5

